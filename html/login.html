<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Inicio Seccion</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="../css/styles.css">
        <link rel="icon" href="../imagenes/logo-yeny.png" type="image/png">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    </head>
    
    <body class="bg-dark min-vh-100 d-flex flex-column">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="../index.html">
                <img src="../imagenes/logo-yeny.png" alt="Logo" height="40" />
                <span class="fw-bold fs-5 text-warning">Juguetes Yeny</span>
            </a>
        </div>
    </nav>

    <div class="container flex-grow-1 d-flex align-items-center justify-content-center py-5">
        <div class="row w-100 justify-content-center g-0 shadow rounded-4 overflow-hidden" style="max-width: 900px;">

            <div class="col-lg-6 d-none d-lg-block position-relative">
                <img src="../imagenes/imagenes de otro sitio/papa e hijo.jpg"
                    alt="Padre saliendo de la tienda con su hija después de una compra"
                    class="w-100 h-100 object-fit-cover" />
                <div class="position-absolute bottom-0 start-0 p-4 bg-dark bg-opacity-50 w-100">
                    <p class="text-warning fw-bold mb-0 fs-5">¡Bienvenido de nuevo!</p>
                    <p class="text-white small mb-0">Los mejores juguetes te esperan.</p>
                </div>
            </div>

            
            <div class="col-12 col-lg-6 bg-dark p-4 p-md-5">

                <div class="mb-4">
                    <img src="../imagenes/logo-yeny.png" height="36" alt="Logo" class="mb-3" />
                    <h4 class="text-white fw-bold mb-1">Inicia sesión</h4>
                    <p class="text-secondary small">Ingresa a tu cuenta para continuar</p>
                </div>

                <form>

                    
                    <div class="mb-3">
                        <label class="form-label text-secondary small">Correo electrónico</label>
                        <div class="input-group">
                            <span class="input-group-text bg-secondary border-secondary text-white">
                                <i class="bi bi-envelope"></i>
                            </span>
                            <input type="email" class="form-control bg-secondary border-secondary text-white"
                                placeholder="tucorreo@ejemplo.com" />
                        </div>
                    </div>

                    
                    <div class="mb-2">
                        <label class="form-label text-secondary small">Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text bg-secondary border-secondary text-white">
                                <i class="bi bi-lock"></i>
                            </span>
                            <input type="password" id="inputPassword"
                                class="form-control bg-secondary border-secondary text-white" placeholder="••••••••" />
                            <button class="btn btn-secondary border-secondary" type="button" onclick="togglePassword()">
                                <i class="bi bi-eye" id="iconoOjo"></i>
                            </button>
                        </div>
                    </div>

                    
                    <div class="text-end mb-4">
                        <a href="#" class="text-warning small text-decoration-none">¿Olvidaste tu contraseña?</a>
                    </div>

                    
                    <button type="submit" class="btn btn-warning w-100 fw-bold py-2 mb-3">
                        <i class="bi bi-box-arrow-in-right me-1"></i> Ingresar
                    </button>

                    <a href="../index.html" class="btn btn-outline-warning w-100 fw-bold py-2 mb-3">
                        <i class="bi bi-person-walking me-1"></i> Ingresar como invitado
                    </a>

                    <!-- Divisor -->
                    <div class="d-flex align-items-center gap-2 mb-3">
                        <hr class="flex-grow-1 border-secondary" />
                        <span class="text-secondary small">o</span>
                        <hr class="flex-grow-1 border-secondary" />
                    </div>

                    
                    <p class="text-center text-secondary small mb-0">
                        ¿No tienes cuenta?
                        <a href="#" class="text-warning text-decoration-none">Regístrate aquí</a>
                    </p>

                </form>
            </div>

        </div>
    </div>   
  </body>
</html>
